app = "budget-tracker-api"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "90s"
    interval = "15s"
    timeout = "10s"
    type = "tcp"
    port = 8080
